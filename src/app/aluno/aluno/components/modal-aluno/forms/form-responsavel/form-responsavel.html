<div>
  <!-- Busca por CPF -->
  <div class="row g-3 align-items-end">
    <div class="col-md-6">
      <label class="form-label">CPF do Responsável</label>
      <input type="text" class="form-control" [(ngModel)]="cpfBusca"
             placeholder="Somente números" maxlength="11"
             [disabled]="!!responsavelEncontrado" />
    </div>
    <div class="col-md-3">
      <button class="btn btn-outline-secondary w-100"
              (click)="buscar()"
              [disabled]="buscando || !!responsavelEncontrado">
        {{ buscando ? 'Buscando...' : 'Buscar' }}
      </button>
    </div>
    @if (responsavelEncontrado) {
      <div class="col-md-3">
        <button class="btn btn-outline-danger w-100" (click)="limpar()">
          Trocar
        </button>
      </div>
    }
  </div>

  <!-- Responsável encontrado -->
  @if (responsavelEncontrado) {
    <div class="alert alert-success mt-3 mb-0 d-flex align-items-center gap-2">
      <span>✅</span>
      <span><strong>{{ responsavelEncontrado.nome_resp }}</strong> será vinculado ao aluno.</span>
    </div>
  }

  <!-- Formulário de novo responsável -->
  @if (mostrarForm) {
    <div class="mt-3 p-3 border rounded bg-light">
      <p class="text-warning mb-3">
        ⚠️ Responsável não encontrado. Preencha os dados para cadastrá-lo.
      </p>

      <h6 class="mb-2">Dados do Responsável</h6>
      <div class="row g-3 mb-3">
        <div class="col-md-4">
          <label class="form-label">CPF</label>
          <input type="text" class="form-control" [value]="cpfBusca" disabled />
        </div>
        <div class="col-md-8">
          <label class="form-label">Nome</label>
          <input type="text" class="form-control" [(ngModel)]="novoResponsavel.nome_resp" />
        </div>
        <div class="col-md-6">
          <label class="form-label">Telefone</label>
          <input type="text" class="form-control" [(ngModel)]="novoResponsavel.telefone_resp" />
        </div>
        <div class="col-md-6">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-control" [(ngModel)]="novoResponsavel.email_resp" />
        </div>
      </div>

      <h6 class="mb-2">Endereço</h6>
      <app-form-endereco [endereco]="novoEndereco" />
    </div>
  }

  @if (erro) {
    <div class="alert alert-danger mt-3">{{ erro }}</div>
  }
</div>
